# Prometheus configuration for MEXC P2P monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "fastapi-backend"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "mexc-p2p-backend"
          environment: "local"
