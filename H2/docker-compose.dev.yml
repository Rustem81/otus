services:
  # ===========================================
  # Infrastructure
  # ===========================================
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mexc_p2p
      POSTGRES_USER: mexc
      POSTGRES_PASSWORD: mexc_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mexc -d mexc_p2p"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ===========================================
  # Database Migrations
  # ===========================================
  migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://mexc:mexc_secret@postgres:5432/mexc_p2p
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  # ===========================================
  # Mock Server (P2P Army emulator)
  # ===========================================
  mock-server:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
      target: development
    ports:
      - "8001:8001"
    volumes:
      - ./mock-server:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/v1/api/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # ===========================================
  # Backend API
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://mexc:mexc_secret@postgres:5432/mexc_p2p
      - REDIS_URL=redis://redis:6379
      - P2P_MOCK_BASE_URL=http://mock-server:8001/v1/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ===========================================
  # Frontend (Quasar/Vue.js) - Development with nginx + runtime config
  # ===========================================
  frontend:
    image: mirror.gcr.io/nginx:alpine
    ports:
      - "9000:8080"
    volumes:
      - ./frontend/dist/spa:/usr/share/nginx/html:rw
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    # Runtime config not needed - using nginx proxy for API
    depends_on:
      backend:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["/bin/sh", "/docker-entrypoint.sh", "nginx", "-g", "daemon off;"]

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
